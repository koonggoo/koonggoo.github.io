<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>koonggoo</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: system-ui, -apple-system, sans-serif;
  background: #fafafa;
  color: #111;
}

/* HERO / NAVBAR */
.hero {
  position: fixed;
  inset: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  transition: all 0.6s ease;
  z-index: 1000;
}

.hero-content {
  text-align: center;
  transition: all 0.6s ease;
}

h1 {
  font-size: clamp(2.5rem, 8vw, 4rem);
  font-weight: 600;
  letter-spacing: -0.02em;
  text-shadow: 0 6px 18px rgba(0, 0, 0, 0.35);
  transition: all 0.6s ease;
}

.subtext {
  margin-top: 0.75rem;
  font-size: clamp(1rem, 3vw, 1.25rem);
  font-weight: 400;
  color: #555;
  text-shadow: 0 3px 10px rgba(0, 0, 0, 0.25);
  transition: all 0.6s ease;
}

/* SCROLLED NAVBAR STATE */
.hero.scrolled {
  top: 0;
  left: 0;
  right: 0;
  bottom: auto;

  height: 70px;
  width: 100%;

  justify-content: flex-start;
  align-items: center;

  padding-left: 24px;

  background: rgba(250, 250, 250, 0.9);
  backdrop-filter: blur(10px);

  box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
}

.hero.scrolled .hero-content {
  text-align: left;
}

.hero.scrolled h1 {
  font-size: 1.8rem;
  text-shadow: 0 0 0 rgba(0, 0, 0, 0);
}

.hero.scrolled .subtext {
  font-size: 0.9rem;
  margin-top: 0;
  text-shadow: 0 0 0 rgba(0, 0, 0, 0);
}

/* PAGE CONTENT */
.content {
  padding-top: 100vh;
}

.section {
  min-height: 100vh;
  padding: 60px;
}

.section h2 {
  margin-bottom: 1rem;
}
</style>
</head>
<body>

<div class="hero" id="hero">
  <div class="hero-content">
    <h1>koonggoo</h1>
    <p class="subtext">a place for chaos</p>
  </div>
</div>

<div class="content">
  <section class="section">
    <h2>Welcome</h2>
    <p>
      This is koonggoo. A website where ultimately anything can unfold.
    </p>
  </section>

  <section class="section">
    <h2>More Content</h2>
    <p>
      Lorem ipsum for now!
    </p>
  </section>
</div>

<script>
const hero = document.getElementById("hero");

window.addEventListener("scroll", () => {
  if (window.scrollY > 100) {
    hero.classList.add("scrolled");
  } else {
    hero.classList.remove("scrolled");
  }
});
</script>

</body>
</html>
