<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>koonggoo</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, sans-serif;
      background: #fafafa;
      color: #111;
    }

    .hero {
      text-align: center;
    }

    h1 {
      font-size: clamp(2.5rem, 8vw, 4rem);
      font-weight: 600;
      letter-spacing: -0.02em;
      text-shadow: 0 6px 18px rgba(0, 0, 0, 0.35);
    }

    .subtext {
      margin-top: 0.75rem;
      font-size: clamp(1rem, 3vw, 1.25rem);
      font-weight: 400;
      color: #555;
      text-shadow: 0 3px 10px rgba(0, 0, 0, 0.25);
    }
  </style>
</head>
<body>
  <div class="hero">
    <h1>koonggoo</h1>
    <p class="subtext">a place for chaos</p>
  </div>
</body>
</html>
